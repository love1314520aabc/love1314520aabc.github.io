<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我们的回忆相册</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }

        /* 主标题 - 放大 */
        h1 {
            text-align: center;
            font-size: 4em;          /* 原来是 2em 左右，现在明显变大 */
            color: #333;
            margin: 30px 0 20px;
        }

        /* 图片网格 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;        /* 保证图片不变形裁剪 */
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .gallery img:hover {
            transform: scale(1.03);
        }

        /* 全屏查看器（点击图片后出现） */
        .viewer {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
        }

        .viewer img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 15px;
        }

        /* 页脚 - 也放大了 */
        .footer {
            text-align: center;
            font-size: 1.8em;         /* 比默认大很多 */
            color: #999;
            margin: 50px 0 20px;
        }
    </style>
</head>
<body>

    <h1>我们的回忆相册</h1>

    <!-- 图片容器 -->
    <div class="gallery" id="box"></div>

    <div class="footer">❤️ 每一张都是珍贵的回忆</div>

    <!-- 查看器（初始隐藏） -->
    <div class="viewer" id="viewer">
        <img id="viewer-img" src="" alt="查看大图" />
    </div>

    <script>
        // ------------------------------------------------------------
        // 在这里设置你的图片数量（如果你有更多或更少，改这个数字即可）
        // 比如你有 20 张，就改成 20，程序会自动生成 001.jpg ~ 020.jpg
        // 如果你的图片命名不连续，请往下看“手动指定”的注释
        // ------------------------------------------------------------
        const imageCount = 13;   // 目前是 001.jpg ~ 013.jpg

        // 自动生成图片文件名列表
        const images = [];
        for (let i = 1; i <= imageCount; i++) {
            const num = String(i).padStart(3, '0'); // 补零：1 -> 001, 13 -> 013
            images.push(num + '.jpg');
        }

        // ----- 如果你的图片不是连续编号，可以改为手动指定 -----
        // 例如：const images = ['001.jpg', '002.jpg', 'myphoto.jpg', ...];
        // 然后把上面的 imageCount 和 for 循环注释掉，用这个数组代替。

        // 渲染图片到网格
        const gallery = document.getElementById('box');
        images.forEach(src => {
            const img = document.createElement('img');
            img.src = 'photos/' + src;   // 相对路径，确保 photos 文件夹在根目录
            img.alt = src;

            // 点击图片 -> 打开查看器
            img.addEventListener('click', function () {
                const viewer = document.getElementById('viewer');
                const viewerImg = document.getElementById('viewer-img');
                viewerImg.src = this.src;
                viewer.style.display = 'flex';
            });

            gallery.appendChild(img);
        });

        // 点击查看器背景（黑色区域）关闭
        const viewer = document.getElementById('viewer');
        viewer.addEventListener('click', function () {
            this.style.display = 'none';
        });

        // 按 ESC 键关闭查看器
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                viewer.style.display = 'none';
            }
        });
    </script>

</body>
</html>
