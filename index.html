<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>我们的回忆相册</title>
    <style>
        /* ---------- 全局 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        /* ---------- 标题 ---------- */
        h1 {
            text-align: center;
            font-size: 3.5em;
            color: #333;
            margin: 20px 0 30px;
        }

        /* ---------- 缩略图网格 - 修改为固定3列 ---------- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);   /* 每行3列 */
            gap: 20px;
            max-width: 900px;                       /* 限制最大宽度，图片不会太宽 */
            margin: 0 auto;                         /* 居中 */
        }
        .gallery-item {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .gallery-item:hover {
            transform: translateY(-5px);
        }
        .gallery-item img {
            width: 100%;
            height: 200px;          /* 固定高度，保持整齐 */
            object-fit: cover;
            display: block;
        }
        .gallery-item .title {
            padding: 8px 10px;
            font-size: 1em;
            color: #555;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ---------- 全屏查看器 ---------- */
        .viewer {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .viewer-inner {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 80%;
            cursor: grab;
            touch-action: none;
        }
        .viewer-inner img {
            max-width: 92%;
            max-height: 92%;
            border-radius: 12px;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* 图片下方信息条 */
        .viewer-caption {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 12px 28px;
            border-radius: 40px;
            text-align: center;
            max-width: 80%;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        .viewer-caption .title {
            font-size: 1.6em;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .viewer-caption .desc {
            font-size: 1.1em;
            opacity: 0.85;
        }

        /* 图片计数 */
        .counter {
            color: #ccc;
            font-size: 1.4em;
            margin-top: 20px;
            background: rgba(0,0,0,0.4);
            padding: 6px 18px;
            border-radius: 30px;
            letter-spacing: 1px;
        }

        /* ---------- 底部页脚 ---------- */
        .footer {
            text-align: center;
            font-size: 1.8em;
            color: #aaa;
            margin: 50px 0 20px;
        }

        /* ---------- 响应式：小屏设备可能显示2列，但尽量保持3列 ---------- */
        @media (max-width: 600px) {
            h1 { font-size: 2.4em; }
            .gallery {
                grid-template-columns: repeat(3, 1fr); /* 依然3列，但图片会缩小 */
                gap: 12px;
                max-width: 100%;
            }
            .gallery-item img { height: 120px; }
            .viewer-caption .title { font-size: 1.2em; }
            .viewer-caption .desc { font-size: 0.9em; }
            .footer { font-size: 1.2em; }
        }
        /* 如果屏幕过窄（<400px），可以改为2列，但用户没要求，我们保留3列，但可能会太挤，所以这里不强制 */
    </style>
</head>
<body>

    <h1>📷 我们的回忆相册</h1>

    <!-- 缩略图网格 -->
    <div class="gallery" id="gallery"></div>

    <!-- 页脚 -->
    <div class="footer">❤️ 每一张照片，都是时光的礼物</div>

    <!-- 全屏查看器 -->
    <div class="viewer" id="viewer">
        <div class="viewer-inner" id="viewer-inner">
            <img id="viewer-img" src="" alt="查看大图" />
            <div class="viewer-caption" id="viewer-caption">
                <div class="title" id="caption-title">标题</div>
                <div class="desc" id="caption-desc">描述</div>
            </div>
        </div>
        <div class="counter" id="counter">1 / 15</div>
    </div>

    <script>
        // ================================================================
        // 1. 配置区 - 请在这里修改你的照片信息和文字
        // ================================================================
        const photoData = [
            { src: '001.jpg', title: '第一张', desc: '这是第一张照片的描述' },
            { src: '002.jpg', title: '第二张', desc: '你可以在这里写任意文字' },
            { src: '003.jpg', title: '第三张', desc: '支持 Emoji 😊' },
            { src: '004.jpg', title: '第四张', desc: '记录美好瞬间' },
            { src: '005.jpg', title: '第五张', desc: '每一张都有故事' },
            { src: '006.jpg', title: '第六张', desc: '夕阳无限好' },
            { src: '007.jpg', title: '第七张', desc: '海边的风' },
            { src: '008.jpg', title: '第八张', desc: '城市夜景' },
            { src: '009.jpg', title: '第九张', desc: '一起走过的路' },
            { src: '010.jpg', title: '第十张', desc: '笑容灿烂' },
            { src: '011.jpg', title: '第十一张', desc: '珍贵的回忆' },
            { src: '012.jpg', title: '第十二张', desc: '四季如歌' },
            { src: '013.jpg', title: '第十三张', desc: '温暖时光' },
            { src: '014.jpg', title: '第十四张', desc: '平淡是真' },
            { src: '015.jpg', title: '第十五张', desc: '未完待续…' }
        ];
        // 如果你的图片不是从001开始，或者名称不规则，直接修改上面数组即可。
        // 图片路径统一为 photos/ + src

        // ================================================================
        // 2. 渲染缩略图
        // ================================================================
        const gallery = document.getElementById('gallery');

        photoData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'gallery-item';

            const img = document.createElement('img');
            img.src = 'photos/' + item.src;
            img.alt = item.title;
            img.loading = 'lazy';

            const titleSpan = document.createElement('div');
            titleSpan.className = 'title';
            titleSpan.textContent = item.title;

            div.appendChild(img);
            div.appendChild(titleSpan);

            div.addEventListener('click', function () {
                openViewer(index);
            });

            gallery.appendChild(div);
        });

        // ================================================================
        // 3. 查看器逻辑
        // ================================================================
        const viewer = document.getElementById('viewer');
        const viewerImg = document.getElementById('viewer-img');
        const counter = document.getElementById('counter');
        const captionTitle = document.getElementById('caption-title');
        const captionDesc = document.getElementById('caption-desc');
        let currentIndex = 0;
        let isOpen = false;

        function openViewer(index) {
            currentIndex = index;
            updateViewer();
            viewer.style.display = 'flex';
            isOpen = true;
        }

        function updateViewer() {
            const data = photoData[currentIndex];
            viewerImg.src = 'photos/' + data.src;
            captionTitle.textContent = data.title;
            captionDesc.textContent = data.desc;
            counter.textContent = (currentIndex + 1) + ' / ' + photoData.length;
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + photoData.length) % photoData.length;
            updateViewer();
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % photoData.length;
            updateViewer();
        }

        function closeViewer() {
            viewer.style.display = 'none';
            isOpen = false;
        }

        viewer.addEventListener('click', function (e) {
            if (e.target === viewer) {
                closeViewer();
            }
        });

        document.addEventListener('keydown', function (e) {
            if (!isOpen) return;
            if (e.key === 'Escape') {
                closeViewer();
                e.preventDefault();
            } else if (e.key === 'ArrowLeft') {
                prevImage();
                e.preventDefault();
            } else if (e.key === 'ArrowRight') {
                nextImage();
                e.preventDefault();
            }
        });

        // ================================================================
        // 4. 触摸滑动切换（手机端）
        // ================================================================
        const inner = document.getElementById('viewer-inner');
        let startX = 0,
            startY = 0,
            isSwiping = false;

        inner.addEventListener('touchstart', function (e) {
            const touch = e.touches[0];
            startX = touch.clientX;
            startY = touch.clientY;
            isSwiping = false;
        }, { passive: true });

        inner.addEventListener('touchmove', function (e) {
            if (!startX) return;
            const touch = e.touches[0];
            const deltaX = touch.clientX - startX;
            const deltaY = touch.clientY - startY;
            if (Math.abs(deltaX) > 10 && Math.abs(deltaX) > Math.abs(deltaY)) {
                isSwiping = true;
                e.preventDefault();
            }
        }, { passive: false });

        inner.addEventListener('touchend', function (e) {
            if (!startX) return;
            const touch = e.changedTouches[0];
            const deltaX = touch.clientX - startX;
            const deltaY = touch.clientY - startY;
            const threshold = 40;

            if (isSwiping && Math.abs(deltaX) > threshold && Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 0) {
                    nextImage();
                } else {
                    prevImage();
                }
                e.preventDefault();
            } else if (!isSwiping && Math.abs(deltaX) < 10 && Math.abs(deltaY) < 10) {
                closeViewer();
            }
            startX = 0;
            startY = 0;
            isSwiping = false;
        }, { passive: false });

        console.log('✅ 相册已加载，共 ' + photoData.length + ' 张照片，每行3张。');
    </script>

</body>
</html>
