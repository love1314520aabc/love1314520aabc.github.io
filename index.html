<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>我们的回忆相册</title>
    <style>
        /* ---------- 全局 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        /* ---------- 标题 ---------- */
        h1 {
            text-align: center;
            font-size: 3.5em;
            color: #333;
            margin: 20px 0 30px;
        }

        /* ---------- 缩略图网格 - 固定3列 ---------- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .gallery-item {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        .gallery-item:hover {
            transform: translateY(-5px);
        }
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        .gallery-item .title {
            padding: 6px 10px 2px;
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .gallery-item .desc {
            padding: 0 10px 10px;
            font-size: 0.9em;
            color: #777;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
            min-height: 2.8em;
        }

        /* ---------- 全屏查看器 ---------- */
        .viewer {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .viewer-inner {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 80%;
            cursor: grab;
            touch-action: none;
        }
        .viewer-inner img {
            max-width: 92%;
            max-height: 92%;
            border-radius: 12px;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* 图片下方信息条 */
        .viewer-caption {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 12px 28px;
            border-radius: 40px;
            text-align: center;
            max-width: 80%;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        .viewer-caption .title {
            font-size: 1.6em;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .viewer-caption .desc {
            font-size: 1.1em;
            opacity: 0.85;
        }

        /* 图片计数 */
        .counter {
            color: #ccc;
            font-size: 1.4em;
            margin-top: 20px;
            background: rgba(0,0,0,0.4);
            padding: 6px 18px;
            border-radius: 30px;
            letter-spacing: 1px;
        }

        /* ---------- 左右箭头按钮 ---------- */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            font-size: 4em;
            padding: 0 20px;
            cursor: pointer;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
            z-index: 10;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.4);
        }
        .nav-btn:active {
            transform: translateY(-50%) scale(0.9);
        }
        .prev-btn {
            left: 20px;
        }
        .next-btn {
            right: 20px;
        }
        @media (max-width: 600px) {
            .nav-btn {
                font-size: 2.5em;
                width: 50px;
                height: 50px;
                padding: 0;
            }
            .prev-btn { left: 10px; }
            .next-btn { right: 10px; }
        }

        /* ---------- 底部页脚 ---------- */
        .footer {
            text-align: center;
            font-size: 1.8em;
            color: #aaa;
            margin: 50px 0 20px;
        }

        /* ---------- 响应式 ---------- */
        @media (max-width: 600px) {
            h1 { font-size: 2.4em; }
            .gallery {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
                max-width: 100%;
            }
            .gallery-item img { height: 120px; }
            .gallery-item .title { font-size: 0.9em; }
            .gallery-item .desc { font-size: 0.75em; -webkit-line-clamp: 1; }
            .viewer-caption .title { font-size: 1.2em; }
            .viewer-caption .desc { font-size: 0.9em; }
            .footer { font-size: 1.2em; }
        }
    </style>
</head>
<body>

    <h1>📷 我们的回忆相册</h1>

    <!-- 缩略图网格 -->
    <div class="gallery" id="gallery"></div>

    <!-- 页脚 -->
    <div class="footer">❤️ 每一张照片，都是时光的礼物</div>

    <!-- 全屏查看器 -->
    <div class="viewer" id="viewer">
        <div class="viewer-inner" id="viewer-inner">
            <button class="nav-btn prev-btn" id="prevBtn">‹</button>
            <button class="nav-btn next-btn" id="nextBtn">›</button>

            <img id="viewer-img" src="" alt="查看大图" />
            <div class="viewer-caption" id="viewer-caption">
                <div class="title" id="caption-title">标题</div>
                <div class="desc" id="caption-desc">描述</div>
            </div>
        </div>
        <div class="counter" id="counter">1 / 15</div>
    </div>

    <script>
        // ================================================================
        // 1. 配置区 - 请在这里修改你的照片信息和文字
        // ================================================================
        const photoData = [
            { src: '001.jpg', title: '第一张', desc: '这是第一张照片的描述' },
            { src: '002.jpg', title: '第二张', desc: '你可以在这里写任意文字' },
            { src: '003.jpg', title: '第三张', desc: '支持 Emoji 😊' },
            { src: '004.jpg', title: '第四张', desc: '记录美好瞬间' },
            { src: '005.jpg', title: '第五张', desc: '每一张都有故事' },
            { src: '006.jpg', title: '第六张', desc: '夕阳无限好' },
            { src: '007.jpg', title: '第七张', desc: '海边的风' },
            { src: '008.jpg', title: '第八张', desc: '城市夜景' },
            { src: '009.jpg', title: '第九张', desc: '一起走过的路' },
            { src: '010.jpg', title: '第十张', desc: '笑容灿烂' },
            { src: '011.jpg', title: '第十一张', desc: '珍贵的回忆' },
            { src: '012.jpg', title: '第十二张', desc: '四季如歌' },
            { src: '013.jpg', title: '第十三张', desc: '温暖时光' },
            { src: '014.jpg', title: '第十四张', desc: '平淡是真' },
            { src: '015.jpg', title: '第十五张', desc: '未完待续…' }
        ];

        // ================================================================
        // 2. 渲染缩略图
        // ================================================================
        const gallery = document.getElementById('gallery');

        photoData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'gallery-item';

            const img = document.createElement('img');
            img.src = 'photos/' + item.src;
            img.alt = item.title;
            img.loading = 'lazy';

            const titleSpan = document.createElement('div');
            titleSpan.className = 'title';
            titleSpan.textContent = item.title;

            const descSpan = document.createElement('div');
            descSpan.className = 'desc';
            descSpan.textContent = item.desc;

            div.appendChild(img);
            div.appendChild(titleSpan);
            div.appendChild(descSpan);

            div.addEventListener('click', function () {
                openViewer(index);
            });

            gallery.appendChild(div);
        });

        // ================================================================
        // 3. 查看器逻辑
        // ================================================================
        const viewer = document.getElementById('viewer');
        const viewerImg = document.getElementById('viewer-img');
        const counter = document.getElementById('counter');
        const captionTitle = document.getElementById('caption-title');
        const captionDesc = document.getElementById('caption-desc');
        let currentIndex = 0;
        let isOpen = false;

        function openViewer(index) {
            currentIndex = index;
            updateViewer();
            viewer.style.display = 'flex';
            isOpen = true;
        }

        function updateViewer() {
            const data = photoData[currentIndex];
            viewerImg.src = 'photos/' + data.src;
            captionTitle.textContent = data.title;
            captionDesc.textContent = data.desc;
            counter.textContent = (currentIndex + 1) + ' / ' + photoData.length;
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + photoData.length) % photoData.length;
            updateViewer();
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % photoData.length;
            updateViewer();
        }

        function closeViewer() {
            viewer.style.display = 'none';
            isOpen = false;
        }

        // 点击黑色背景关闭
        viewer.addEventListener('click', function (e) {
            if (e.target === viewer) {
                closeViewer();
            }
        });

        // 键盘事件（左右箭头方向保持不变：左←上一张，右→下一张）
        document.addEventListener('keydown', function (e) {
            if (!isOpen) return;
            if (e.key === 'Escape') {
                closeViewer();
                e.preventDefault();
            } else if (e.key === 'ArrowLeft') {
                prevImage();
                e.preventDefault();
            } else if (e.key === 'ArrowRight') {
                nextImage();
                e.preventDefault();
            }
        });

        // 箭头按钮点击
        document.getElementById('prevBtn').addEventListener('click', function (e) {
            e.stopPropagation();
            if (isOpen) prevImage();
        });
        document.getElementById('nextBtn').addEventListener('click', function (e) {
            e.stopPropagation();
            if (isOpen) nextImage();
        });

        // ================================================================
        // 4. 触摸滑动切换（已修改：左滑下一张，右滑上一张）
        // ================================================================
        const inner = document.getElementById('viewer-inner');
        let startX = 0,
            startY = 0,
            isSwiping = false;

        inner.addEventListener('touchstart', function (e) {
            const touch = e.touches[0];
            startX = touch.clientX;
            startY = touch.clientY;
            isSwiping = false;
        }, { passive: true });

        inner.addEventListener('touchmove', function (e) {
            if (!startX) return;
            const touch = e.touches[0];
            const deltaX = touch.clientX - startX;
            const deltaY = touch.clientY - startY;
            if (Math.abs(deltaX) > 10 && Math.abs(deltaX) > Math.abs(deltaY)) {
                isSwiping = true;
                e.preventDefault();
            }
        }, { passive: false });

        inner.addEventListener('touchend', function (e) {
            if (!startX) return;
            const touch = e.changedTouches[0];
            const deltaX = touch.clientX - startX;
            const deltaY = touch.clientY - startY;
            const threshold = 40;

            if (isSwiping && Math.abs(deltaX) > threshold && Math.abs(deltaX) > Math.abs(deltaY)) {
                // 修改：左滑（deltaX < 0）→ 下一张，右滑（deltaX > 0）→ 上一张
                if (deltaX < 0) {
                    nextImage(); // 左滑下一张
                } else {
                    prevImage(); // 右滑上一张
                }
                e.preventDefault();
            } else if (!isSwiping && Math.abs(deltaX) < 10 && Math.abs(deltaY) < 10) {
                // 轻触关闭
                closeViewer();
            }
            startX = 0;
            startY = 0;
            isSwiping = false;
        }, { passive: false });

        console.log('✅ 相册已加载，共 ' + photoData.length + ' 张照片。触摸滑动已改为：左滑下一张，右滑上一张。');
    </script>

</body>
</html>
