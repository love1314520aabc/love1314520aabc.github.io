<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>我的照片墙</title>

<style>
img {
    width:300px;
    margin:10px;
    border-radius:10px;
}
</style>

</head>

<body>

<h1>我的照片</h1>

<div id="box"></div>


<script>

let photos=[
"001.jpg",
"002.jpg",
"003.jpg"
];

let box=document.getElementById("box");

photos.forEach(p=>{
    box.innerHTML += `<img src="photos/${p}">`;
});

</script>


</body>
</html>
