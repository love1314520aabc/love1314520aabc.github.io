<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>我们的回忆相册</title>
    <style>
        /* ---------- 全局 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        /* ---------- 标题 ---------- */
        h1 {
            text-align: center;
            font-size: 3.5em;
            color: #333;
            margin: 20px 0 30px;
        }

        /* ---------- 缩略图网格 - 固定4列 ---------- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .gallery-item {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        .gallery-item:hover {
            transform: translateY(-5px);
        }
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        /* 只保留描述，标题已删除 */
        .gallery-item .desc {
            padding: 10px 12px;
            font-size: 1em;
            color: #555;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            min-height: 3em;
            background: #fafafa;
            border-top: 1px solid #eee;
        }

        /* ---------- 全屏查看器 ---------- */
        .viewer {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .viewer-inner {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 80%;
            cursor: grab;
            touch-action: none;
        }
        .viewer-inner img {
            max-width: 92%;
            max-height: 92%;
            border-radius: 12px;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* 图片下方信息条 - 只显示描述 */
        .viewer-caption {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 12px 28px;
            border-radius: 40px;
            text-align: center;
            max-width: 80%;
            backdrop-filter: blur(4px);
            pointer-events: none;
            font-size: 1.5em;
            line-height: 1.5;
        }

        /* 图片计数 */
        .counter {
            color: #ccc;
            font-size: 1.4em;
            margin-top: 20px;
            background: rgba(0,0,0,0.4);
            padding: 6px 18px;
            border-radius: 30px;
            letter-spacing: 1px;
        }

        /* ---------- 关闭按钮 ---------- */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            font-size: 3em;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, transform 0.2s;
            z-index: 20;
            backdrop-filter: blur(4px);
            pointer-events: auto;
        }
        .close-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.1);
        }
        .close-btn:active {
            transform: scale(0.9);
        }

        /* ---------- 左右箭头 ---------- */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            font-size: 4em;
            padding: 0 20px;
            cursor: pointer;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
            z-index: 10;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.4);
        }
        .nav-btn:active {
            transform: translateY(-50%) scale(0.9);
        }
        .prev-btn {
            left: 20px;
        }
        .next-btn {
            right: 20px;
        }

        /* ---------- 底部页脚 ---------- */
        .footer {
            text-align: center;
            font-size: 1.8em;
            color: #aaa;
            margin: 50px 0 20px;
        }

        /* ---------- 响应式 ---------- */
        @media (max-width: 700px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
                max-width: 100%;
            }
            .gallery-item img { height: 160px; }
        }
        @media (max-width: 450px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .gallery-item img { height: 120px; }
            .gallery-item .desc { font-size: 0.8em; padding: 6px 8px; }
            .viewer-caption { font-size: 1.2em; padding: 10px 16px; }
            .footer { font-size: 1.2em; }
            h1 { font-size: 2.4em; }
            .close-btn {
                font-size: 2.2em;
                width: 50px;
                height: 50px;
                top: 10px;
                right: 15px;
            }
            .nav-btn {
                font-size: 2.5em;
                width: 50px;
                height: 50px;
                padding: 0;
            }
            .prev-btn { left: 10px; }
            .next-btn { right: 10px; }
        }
    </style>
</head>
<body>

    <h1>📷 我们的回忆相册</h1>

    <!-- 缩略图网格 -->
    <div class="gallery" id="gallery"></div>

    <!-- 页脚 -->
    <div class="footer">❤️ 每一张照片，都是时光的礼物</div>

    <!-- 全屏查看器 -->
    <div class="viewer" id="viewer">
        <div class="viewer-inner" id="viewer-inner">
            <button class="close-btn" id="closeBtn">✕</button>
            <button class="nav-btn prev-btn" id="prevBtn">‹</button>
            <button class="nav-btn next-btn" id="nextBtn">›</button>

            <img id="viewer-img" src="" alt="查看大图" />
            <!-- 只显示描述，没有标题 -->
            <div class="viewer-caption" id="viewer-caption">
                <span id="caption-desc">描述文字</span>
            </div>
        </div>
        <div class="counter" id="counter">1 / 16</div>
    </div>

    <script>
        // ================================================================
        // 1. 配置区 - 共16张照片（001.jpg ~ 016.jpg）
        //    你只需要修改 desc（描述）字段，title 已不再显示
        // ================================================================
        const photoData = [
            { src: '001.jpg', title: '', desc: '这是第一张照片的描述' },
            { src: '002.jpg', title: '', desc: '你可以在这里写任意文字' },
            { src: '003.jpg', title: '', desc: '支持 Emoji 😊' },
            { src: '004.jpg', title: '', desc: '记录美好瞬间' },
            { src: '005.jpg', title: '', desc: '每一张都有故事' },
            { src: '006.jpg', title: '', desc: '夕阳无限好' },
            { src: '007.jpg', title: '', desc: '海边的风' },
            { src: '008.jpg', title: '', desc: '城市夜景' },
            { src: '009.jpg', title: '', desc: '一起走过的路' },
            { src: '010.jpg', title: '', desc: '笑容灿烂' },
            { src: '011.jpg', title: '', desc: '珍贵的回忆' },
            { src: '012.jpg', title: '', desc: '四季如歌' },
            { src: '013.jpg', title: '', desc: '温暖时光' },
            { src: '014.jpg', title: '', desc: '平淡是真' },
            { src: '015.jpg', title: '', desc: '未完待续…' },
            { src: '016.jpg', title: '', desc: '新的开始 ✨' }
        ];

        // ================================================================
        // 2. 渲染缩略图（只显示描述）
        // ================================================================
        const gallery = document.getElementById('gallery');

        photoData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'gallery-item';

            const img = document.createElement('img');
            img.src = 'photos/' + item.src;
            img.alt = item.desc || '图片';
            img.loading = 'lazy';

            // 只有描述，没有标题
            const descSpan = document.createElement('div');
            descSpan.className = 'desc';
            descSpan.textContent = item.desc;

            div.appendChild(img);
            div.appendChild(descSpan);

            div.addEventListener('click', function () {
                openViewer(index);
            });

            gallery.appendChild(div);
        });

        // ================================================================
        // 3. 查看器逻辑
        // ================================================================
        const viewer = document.getElementById('viewer');
        const viewerImg = document.getElementById('viewer-img');
        const counter = document.getElementById('counter');
        const captionDesc = document.getElementById('caption-desc');
        let currentIndex = 0;
        let isOpen = false;

        function openViewer(index) {
            currentIndex = index;
            updateViewer();
            viewer.style.display = 'flex';
            isOpen = true;
        }

        function updateViewer() {
            const data = photoData[currentIndex];
            viewerImg.src = 'photos/' + data.src;
            captionDesc.textContent = data.desc;
            counter.textContent = (currentIndex + 1) + ' / ' + photoData.length;
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + photoData.length) % photoData.length;
            updateViewer();
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % photoData.length;
            updateViewer();
        }

        function closeViewer() {
            viewer.style.display = 'none';
            isOpen = false;
        }

        // 点击黑色背景关闭
        viewer.addEventListener('click', function (e) {
            if (e.target === viewer) {
                closeViewer();
            }
        });

        // 关闭按钮
        document.getElementById('closeBtn').addEventListener('click', function (e) {
            e.stopPropagation();
            closeViewer();
        });

        // 键盘
        document.addEventListener('keydown', function (e) {
            if (!isOpen) return;
            if (e.key === 'Escape') {
                closeViewer();
                e.preventDefault();
            } else if (e.key === 'ArrowLeft') {
                prevImage();
                e.preventDefault();
            } else if (e.key === 'ArrowRight') {
                nextImage();
                e.preventDefault();
            }
        });

        // 箭头按钮
        document.getElementById('prevBtn').addEventListener('click', function (e) {
            e.stopPropagation();
            if (isOpen) prevImage();
        });
        document.getElementById('nextBtn').addEventListener('click', function (e) {
            e.stopPropagation();
            if (isOpen) nextImage();
        });

        // ================================================================
        // 4. 触摸滑动（左滑下一张，右滑上一张）
        // ================================================================
        const inner = document.getElementById('viewer-inner');
        let startX = 0, startY = 0, isSwiping = false;

        inner.addEventListener('touchstart', function (e) {
            const touch = e.touches[0];
            startX = touch.clientX;
            startY = touch.clientY;
            isSwiping = false;
        }, { passive: true });

        inner.addEventListener('touchmove', function (e) {
            if (!startX) return;
            const touch = e.touches[0];
            const deltaX = touch.clientX - startX;
            const deltaY = touch.clientY - startY;
            if (Math.abs(deltaX) > 10 && Math.abs(deltaX) > Math.abs(deltaY)) {
                isSwiping = true;
                e.preventDefault();
            }
        }, { passive: false });

        inner.addEventListener('touchend', function (e) {
            if (!startX) return;
            const touch = e.changedTouches[0];
            const deltaX = touch.clientX - startX;
            const deltaY = touch.clientY - startY;
            const threshold = 40;

            if (isSwiping && Math.abs(deltaX) > threshold && Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX < 0) nextImage();
                else prevImage();
                e.preventDefault();
            } else if (!isSwiping && Math.abs(deltaX) < 10 && Math.abs(deltaY) < 10) {
                closeViewer();
            }
            startX = 0;
            startY = 0;
            isSwiping = false;
        }, { passive: false });

        console.log('✅ 相册已加载，只显示描述文字。');
    </script>

</body>
</html>
