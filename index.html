<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>致我喜欢的人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        /* 爱心飘落效果 */
        .heart {
            position: absolute;
            color: #ff6b81;
            font-size: 20px;
            animation: fall linear infinite;
            opacity: 0.7;
        }
        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
        /* 文字容器 */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 50px 80px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }
        h1 {
            color: #ff4757;
            font-size: 42px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        p {
            color: #333;
            font-size: 22px;
            line-height: 1.8;
            margin: 15px 0;
            opacity: 0;
            animation: fadeIn 1.5s forwards;
        }
        p:nth-child(2) { animation-delay: 0.5s; }
        p:nth-child(3) { animation-delay: 1.5s; }
        p:nth-child(4) { animation-delay: 2.5s; }
        p:nth-child(5) { animation-delay: 3.5s; }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        /* 按钮 */
        .btn {
            margin-top: 40px;
            padding: 15px 40px;
            background: #ff6b81;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 1s forwards 4.5s;
        }
        .btn:hover {
            background: #ff4757;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 107, 129, 0.4);
        }
    </style>
</head>
<body>
    <!-- 爱心飘落 -->
    <script>
        // 生成随机爱心
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '♥';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            heart.style.animationDuration = Math.random() * 3 + 5 + 's';
            document.body.appendChild(heart);
            // 移除多余元素
            setTimeout(() => heart.remove(), 8000);
        }
        // 每隔300ms生成一个爱心
        setInterval(createHeart, 300);
    </script>

    <!-- 表白内容 -->
    <div class="container">
        <h1>致我最心动的你 💌</h1>
        <p>遇见你之前，我以为生活就是按部就班。</p>
        <p>遇见你之后，我才明白什么是心动和期待。</p>
        <p>往后余生，想和你一起看遍所有风景，吃遍所有美食。</p>
        <p>做我女朋友，好吗？</p>
        <button class="btn" onclick="alert('我就知道你会答应我！♥')">我愿意！</button>
    </div>

    <!-- 背景音乐（可选，默认不自动播放，需用户点击后播放） -->
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    
    <script>
        // 点击页面任意位置播放音乐
        document.addEventListener('click', function() {
            const music = document.getElementById('bgMusic');
            if (music.paused) {
                music.play();
            }
        });
    </script>
</body>
</html>
