<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>我们的回忆相册</title>


<style>

body{
    margin:0;
    background:#fff5f7;
    font-family:"Microsoft YaHei",Arial;
    text-align:center;
}


/* 标题 */

h1{
    margin-top:40px;
    color:#ff6699;
}


.desc{
    color:#888;
    font-size:16px;
    margin-bottom:30px;
}



/* 照片墙 */

#box{

    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;

}


.photo{

    width:280px;
    height:280px;

    object-fit:cover;

    border-radius:15px;

    cursor:pointer;

    box-shadow:0 5px 15px rgba(0,0,0,0.15);

    transition:0.3s;

}



.photo:hover{

    transform:scale(1.05);

}




/* 查看大图 */

.viewer{

    display:none;

    position:fixed;

    left:0;
    top:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.85);

    justify-content:center;

    align-items:center;

    z-index:999;

}



.viewer img{

    max-width:90%;

    max-height:90%;

    border-radius:15px;

}



.footer{

    margin:50px 0;

    color:#999;

}


</style>


</head>



<body>



<h1>❤️ 我们的回忆相册 ❤️</h1>


<div class="desc">

每一张照片视频，都是值得珍藏的回忆。

</div>



<div id="box"></div>




<!-- 大图弹窗 -->

<div class="viewer" id="viewer" onclick="closePhoto()">

<img id="bigPhoto">

</div>





<script>


let photos=[

"001.jpg",

"002.jpg",

"003.jpg",

"004.jpg",

"005.jpg",

"006.jpg"

];



let box=document.getElementById("box");



photos.forEach(p=>{


box.innerHTML +=

`

<img class="photo" 

src="photos/${p}" 

onclick="openPhoto(this.src)">

`;


});





function openPhoto(src){


document.getElementById("viewer").style.display="flex";


document.getElementById("bigPhoto").src=src;


}




function closePhoto(){


document.getElementById("viewer").style.display="none";


}



</script>




<div class="footer">

💕 永远珍藏我们的美好时光 💕

</div>



</body>

</html>
